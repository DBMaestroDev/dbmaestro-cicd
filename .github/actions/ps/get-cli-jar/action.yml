# Version: v1.7
name: 'Get DBmaestro CLI JAR'
description: 'Downloads the DBmaestro Agent JAR file from GitHub releases'
inputs:
  version:
    description: 'Version of the DBmaestro Agent JAR to download (e.g., 26.1.0.13224)'
    required: true
  jar-path:
    description: 'Path where the JAR file will be saved (including filename, e.g., .\DBmaestroAgent.jar)'
    required: true
outputs:
  jar-file:
    description: 'Path to the downloaded JAR file'
    value: ${{ inputs.jar-path }}
  download-success:
    description: 'Whether the download was successful'
    value: ${{ steps.download.outputs.download_success }}
runs:
  using: 'composite'
  steps:
    - name: Download DBmaestro Agent JAR
      id: download
      shell: pwsh
      env:
        DBMAESTRO_VERSION: ${{ inputs.version }}
        DBMAESTRO_JAR_PATH: ${{ inputs.jar-path }}
      run: |
        $env:DBM_OUTPUT_FILE = $env:GITHUB_OUTPUT
        & "$env:GITHUB_WORKSPACE/core/scripts/ps/get-cli-jar.ps1"

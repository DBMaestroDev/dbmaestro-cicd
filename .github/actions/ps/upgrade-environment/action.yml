# Version: v1.8
name: 'Upgrade Environment'
description: 'Upgrades a target environment with a specific package using DBmaestro'
inputs:
  package_name:
    description: 'Package name to upgrade'
    required: true
  target_environment:
    description: 'Target environment for upgrade'
    required: true
  project_name:
    description: 'DBmaestro project name'
    required: true
  agent_jar_path:
    description: 'Path to DBmaestro Agent JAR file'
    required: true
  use_ssl:
    description: 'Use SSL for DBmaestro connection'
    required: false
    default: 'True'
  dbmaestro_server:
    description: 'DBmaestro server URL'
    required: true
  DBMAESTRO_USER:
    description: 'DBmaestro username'
    required: true
  DBMAESTRO_PASSWORD:
    description: 'DBmaestro password'
    required: true
  auth_type:
    description: 'DBmaestro authentication type'
    required: false
    default: 'DBmaestroAccount'
runs:
  using: 'composite'
  steps:
    - name: Checkout dbmaestro-cicd repository
      uses: actions/checkout@v6
      with:
        repository: DBMaestroDev/dbmaestro-cicd
        path: dbmaestro-cicd
        ref: main

    - name: Summary
      shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
      run: |
        $package = "${{ inputs.package_name }}"
        $targetEnv = "${{ inputs.target_environment }}"
        $projectName = "${{ inputs.project_name }}"

        $summary = @"
        ## :rocket: Environment Upgrade Summary

        | Property | Value |
        |----------|-------|
        | **Environment** | $targetEnv |
        | **Project Name** | $projectName |
        | **Package Name** | $package |
        | **Triggered By** | ${{ github.actor }} |
        | **Timestamp** | $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC') |
        "@

        Write-Host $summary
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

    - name: Execute Upgrade
      shell: pwsh
      env:
        DBMAESTRO_PACKAGE_NAME: ${{ inputs.package_name }}
        DBMAESTRO_PROJECT_NAME: ${{ inputs.project_name }}
        DBMAESTRO_TARGET_ENV: ${{ inputs.target_environment }}
        DBMAESTRO_AGENT_JAR: ${{ inputs.agent_jar_path }}
        DBMAESTRO_SERVER: ${{ inputs.dbmaestro_server }}
        DBMAESTRO_USER: ${{ inputs.DBMAESTRO_USER }}
        DBMAESTRO_PASSWORD: ${{ inputs.DBMAESTRO_PASSWORD }}
        DBMAESTRO_USE_SSL: ${{ inputs.use_ssl }}
        DBMAESTRO_AUTH_TYPE: ${{ inputs.auth_type }}
      run: '& "$env:GITHUB_WORKSPACE/dbmaestro-cicd/core/scripts/ps/upgrade-environment.ps1"'

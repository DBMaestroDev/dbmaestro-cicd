# Version: v1.8
name: 'Precheck DBmaestro Package'
description: 'Validates a DBmaestro package using precheck operation'
inputs:
  agent_jar_path:
    description: 'Path to DBmaestro agent JAR file'
    required: true
  auth_type:
    description: 'Authentication type'
    required: false
    default: 'DBmaestroAccount'
  dbmaestro_password:
    description: 'DBmaestro password or token'
    required: true
  dbmaestro_server:
    description: 'DBmaestro server hostname'
    required: true
  dbmaestro_user:
    description: 'DBmaestro username'
    required: true
  package_name:
    description: 'Name of the package to validate'
    required: true
  project_name:
    description: 'DBmaestro project name'
    required: true
  use_ssl:
    description: 'Use SSL for connection'
    required: false
    default: 'True'
outputs:
  validation-passed:
    description: 'Whether validation passed'
    value: ${{ steps.precheck.outputs.success }}
runs:
  using: 'composite'
  steps:
    - name: Run precheck validation
      id: precheck
      shell: bash
      run: |
        echo "Pre-checking package ${{ inputs.package_name }}"
        java -jar "${{ inputs.agent_jar_path }}" -PreCheck \
          -ProjectName "${{ inputs.project_name }}" \
          -PackageName "${{ inputs.package_name }}" \
          -Server "${{ inputs.dbmaestro_server }}" \
          -UseSSL "${{ inputs.use_ssl }}" \
          -AuthType "${{ inputs.auth_type }}" \
          -UserName "${{ inputs.dbmaestro_user }}" \
          -Password "${{ inputs.dbmaestro_password }}"

        if [ $? -eq 0 ]; then
          echo "Precheck validation passed"
          echo "success=true" >> $GITHUB_OUTPUT
        else
          echo "Precheck validation failed"
          echo "success=false" >> $GITHUB_OUTPUT
          exit 1
        fi

# Version: v1.7
name: 'Build Package from Source Control'
description: 'Build a DBmaestro package from source control (Tasks or Specific Commit)'
author: 'DBmaestro'

inputs:
  package_name:
    description: 'Name of the package to build'
    required: true
  project_name:
    description: 'DBmaestro project name'
    required: true
  environment-name:
    description: 'Development environment name'
    required: true
  version_type:
    description: 'Version type: Tasks or Specific Commit'
    required: false
    default: ''
  additional_information:
    description: 'Tasks list (comma-separated) or specific commit hash'
    required: false
    default: ''
  agent_jar_path:
    description: 'Path to DBmaestro Agent JAR file'
    required: true
  dbmaestro_server:
    description: 'DBmaestro server URL'
    required: true
  use_ssl:
    description: 'Use SSL for connection'
    required: false
    default: 'True'
  auth_type:
    description: 'Authentication type'
    required: false
    default: 'DBmaestroAccount'
  dbmaestro_user:
    description: 'DBmaestro username'
    required: true
  dbmaestro_password:
    description: 'DBmaestro password'
    required: true

outputs:
  package-created:
    description: 'Whether the package was created successfully (true/false)'
    value: ${{ steps.build.outcome == 'success' }}

runs:
  using: 'composite'
  steps:
    - name: Build Package from Source Control
      id: build
      shell: bash
      run: |
        echo "==== Building package: ${{ inputs.package_name }} ===="
        echo "Project: ${{ inputs.project_name }}"
        echo "Environment: ${{ inputs.environment-name }}"
        echo "Version Type: ${{ inputs.version_type }}"
        echo "Additional Information: ${{ inputs.additional_information }}"
        
        java -jar "${{ inputs.agent_jar_path }}" -Build \
          -ProjectName "${{ inputs.project_name }}" \
          -EnvName "${{ inputs.environment-name }}" \
          -VersionType "${{ inputs.version_type }}" \
          -AdditionalInformation "${{ inputs.additional_information }}" \
          -CreatePackage True \
          -PackageName "${{ inputs.package_name }}" \
          -Server "${{ inputs.dbmaestro_server }}" \
          -UseSSL "${{ inputs.use_ssl }}" \
          -AuthType "${{ inputs.auth_type }}" \
          -UserName "${{ inputs.username }}" \
          -Password "${{ inputs.password }}"
        
        if [ $? -ne 0 ]; then
          echo "::error::Failed to build package ${{ inputs.package_name }}"
          exit 1
        fi
        
        echo "✅ Package ${{ inputs.package_name }} built successfully"

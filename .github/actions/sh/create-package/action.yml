# Version: v1.11
name: 'Create DBmaestro Package'
description: 'Creates a DBmaestro package from a folder with manifest, tar archive, and package creation'
inputs:
  agent_jar_path:
    description: 'Path to DBmaestro agent JAR file'
    required: true
  auth_type:
    description: 'Authentication type'
    required: false
    default: 'DBmaestroAccount'
  dbmaestro_password:
    description: 'DBmaestro password or token'
    required: true
  dbmaestro_server:
    description: 'DBmaestro server hostname'
    required: true
  dbmaestro_user:
    description: 'DBmaestro username'
    required: true
  ignore_script_warnings:
    description: 'Ignore script warnings during package creation'
    required: false
    default: 'True'
  package_name:
    description: 'Name of the package to create'
    required: true
  package_type:
    description: 'Package type (Regular or AdHoc)'
    required: false
    default: 'Regular'
  packages_folder:
    description: 'Root folder containing packages'
    required: false
    default: 'packages'
  project_name:
    description: 'DBmaestro project name'
    required: true
  use_ssl:
    description: 'Use SSL for connection'
    required: false
    default: 'True'
outputs:
  package-created:
    description: 'Whether package was created successfully'
    value: ${{ steps.create.outputs.package_created }}
runs:
  using: 'composite'
  steps:
    - name: Checkout dbmaestro-cicd repository
      uses: actions/checkout@v6
      with:
        repository: DBMaestroDev/dbmaestro-cicd
        path: dbmaestro-cicd
        ref: main

    - name: Create Package
      id: create
      shell: bash
      env:
        DBMAESTRO_PACKAGE_NAME: ${{ inputs.package_name }}
        DBMAESTRO_PROJECT_NAME: ${{ inputs.project_name }}
        DBMAESTRO_AGENT_JAR: ${{ inputs.agent_jar_path }}
        DBMAESTRO_SERVER: ${{ inputs.dbmaestro_server }}
        DBMAESTRO_USER: ${{ inputs.dbmaestro_user }}
        DBMAESTRO_PASSWORD: ${{ inputs.dbmaestro_password }}
        DBMAESTRO_PACKAGES_FOLDER: ${{ inputs.packages_folder }}
        DBMAESTRO_USE_SSL: ${{ inputs.use_ssl }}
        DBMAESTRO_AUTH_TYPE: ${{ inputs.auth_type }}
        DBMAESTRO_PACKAGE_TYPE: ${{ inputs.package_type }}
        DBMAESTRO_IGNORE_WARNINGS: ${{ inputs.ignore_script_warnings }}
      run: |
        export DBM_OUTPUT_FILE="$GITHUB_OUTPUT"
        bash "$GITHUB_WORKSPACE/dbmaestro-cicd/core/scripts/sh/create-package.sh"

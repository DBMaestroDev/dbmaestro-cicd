# Version: v1.11
name: 'Upgrade Environment'
description: 'Upgrades a target environment with a specific package using DBmaestro (Linux/bash)'
inputs:
  agent_jar_path:
    description: 'Path to DBmaestro Agent JAR file'
    required: true
  auth_type:
    description: 'DBmaestro authentication type'
    required: false
    default: 'DBmaestroAccount'
  dbmaestro_password:
    description: 'DBmaestro password'
    required: true
  dbmaestro_user:
    description: 'DBmaestro username'
    required: true
  dbmaestro_server:
    description: 'DBmaestro server URL'
    required: true
  package_name:
    description: 'Package name to upgrade'
    required: true
  project_name:
    description: 'DBmaestro project name'
    required: true
  target_environment:
    description: 'Target environment for upgrade'
    required: true
  use_ssl:
    description: 'Use SSL for DBmaestro connection'
    required: false
    default: 'True'
runs:
  using: 'composite'
  steps:
    - name: Summary
      shell: bash
      run: |
        set -e

        package="${{ inputs.package_name }}"
        target_env="${{ inputs.target_environment }}"
        project_name="${{ inputs.project_name }}"
        timestamp=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

        cat >> "$GITHUB_STEP_SUMMARY" << EOF
        ## :rocket: Environment Upgrade Summary

        | Property | Value |
        |----------|-------|
        | **Environment** | $target_env |
        | **Project Name** | $project_name |
        | **Package Name** | $package |
        | **Triggered By** | ${{ github.actor }} |
        | **Timestamp** | $timestamp |
        EOF

        echo "Summary written to GitHub Step Summary"

    - name: Execute Upgrade
      shell: bash
      env:
        DBMAESTRO_PACKAGE_NAME: ${{ inputs.package_name }}
        DBMAESTRO_PROJECT_NAME: ${{ inputs.project_name }}
        DBMAESTRO_TARGET_ENV: ${{ inputs.target_environment }}
        DBMAESTRO_AGENT_JAR: ${{ inputs.agent_jar_path }}
        DBMAESTRO_SERVER: ${{ inputs.dbmaestro_server }}
        DBMAESTRO_USER: ${{ inputs.dbmaestro_user }}
        DBMAESTRO_PASSWORD: ${{ inputs.dbmaestro_password }}
        DBMAESTRO_USE_SSL: ${{ inputs.use_ssl }}
        DBMAESTRO_AUTH_TYPE: ${{ inputs.auth_type }}
      run: bash "$GITHUB_WORKSPACE/core/scripts/sh/upgrade-environment.sh"

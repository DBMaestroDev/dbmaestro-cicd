# GitHub Actions Set Version Workflow (Linux)
# Manual workflow for setting environment package version

name: Set Version (Linux)

on:
  workflow_dispatch:
    inputs:
      PackageName:
        description: 'Package name to set'
        required: true
        type: string
      ProjectName:
        description: 'Project name'
        required: true
        type: string
      EnvName:
        description: 'Environment name'
        required: true
        type: string

env:
  AGENT_JAR: "/home/runner/DBmaestroAgent.jar"
  DBMAESTRO_USE_SSL: "True"
  DBMAESTRO_SERVER: "host.docker.internal:8017"
  DBMAESTRO_AUTH_TYPE: "DBmaestroAccount"
  DBMAESTRO_USER: "${{ secrets.DBMAESTRO_USER }}"
  DBMAESTRO_PASSWORD: "${{ secrets.DBMAESTRO_PASSWORD }}"

jobs:
  set_version:
    name: Set Version
    runs-on: dbmaestro-linux
    
    steps:
      - name: Set Version
        run: |
          java -jar "$AGENT_JAR" \
            -SetVersion \
            -ProjectName "${{ github.event.inputs.ProjectName }}" \
            -EnvName "${{ github.event.inputs.EnvName }}" \
            -PackageName "${{ github.event.inputs.PackageName }}" \
            -Force True \
            -UseSSL "$DBMAESTRO_USE_SSL" \
            -Server "$DBMAESTRO_SERVER" \
            -AuthType "$DBMAESTRO_AUTH_TYPE" \
            -UserName "$DBMAESTRO_USER" \
            -Password "$DBMAESTRO_PASSWORD"
        shell: bash

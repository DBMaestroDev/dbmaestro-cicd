# GitHub Actions Environment Upgrade Pipeline
# Manual workflow for upgrading environments
# Packages must be built and validated prior to upgrade

name: Upgrade Environment

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name list to upgrade (comma-separated for multiple packages)'
        required: true
        type: string
      target_environment:
        description: 'Target environment for upgrade'
        required: false
        type: choice
        options:
          - 'Release Source'
          - 'Prod_Env_1'
          - 'QA_Env_1'
          - 'Prod_Env_3'
  # This trigger can be used to pick target environment based on branch name
  # Fetch the changed folders and use to get the package name(s)
  push:
    branches:
      - Release_Source
      - Prod_Env_1
      - QA_Env_1
      - Prod_Env_3
  pull_request:
    branches:
      - Prod_Env_1
      - QA_Env_1
      - Prod_Env_3

env:
  GIT_DEPTH: 1
  AGENT_JAR: "C:\\Program Files (x86)\\DBmaestro\\DOP Server\\Agent\\DBmaestroAgent.jar"
  PROJECT_NAME: "Demo-PSQL"
  DBMAESTRO_USE_SSL: "True"
  DBMAESTRO_SERVER: "${{ vars.DBMAESTRO_SERVER }}"
  DBMAESTRO_AUTH_TYPE: "DBmaestroAccount"
  DBMAESTRO_USER: "${{ secrets.DBMAESTRO_USER }}"
  DBMAESTRO_PASSWORD: "${{ secrets.DBMAESTRO_PASSWORD }}"

jobs:
  # Will detect changed packages by comparing with previous commit (push) or from workflow input (manual)
  detect_changed_packages:
    name: Detect Changed Packages
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-packages: ${{ steps.set-matrix.outputs.has-packages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Packages
        id: set-matrix
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $packages = @()

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            # Handle manual workflow dispatch with comma-separated package names
            $packageInput = "${{ github.event.inputs.package_name }}"
            Write-Host "Package input: $packageInput"
            $packages = $packageInput -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          } else {
            # Handle push event - detect changed files in packages/ folder
            $changedFiles = git diff --name-only HEAD~1 HEAD
            Write-Host "Changed files: $($changedFiles -join ', ')"

            foreach ($file in $changedFiles) {
              if ($file -match '^packages/([^/]+)') {
                $packageName = $matches[1]
                if ($packageName -notin $packages) {
                  $packages += $packageName
                }
              }
            }
          }

          # Sort alphabetically
          $packages = $packages | Sort-Object

          if ($packages.Count -eq 0) {
            Write-Host "No packages detected"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "has-packages=false"
            $matrix = @([PSCustomObject]@{package = ""})
          } else {
            Write-Host "Detected packages: $($packages -join ', ')"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "has-packages=true"
            # Create sorted matrix from packages
            $matrix = $packages | Sort-Object | ForEach-Object { [PSCustomObject]@{package = $_} }
          }

          # Convert to JSON array (compatible with PowerShell 5.1)
          # Ensure we always get an array format for the matrix
          if (@($matrix).Count -eq 1) {
            $matrixJson = @($matrix) | ConvertTo-Json -Compress
            $matrixJson = "[$matrixJson]"
          } else {
            $matrixJson = @($matrix) | ConvertTo-Json -Compress
          }
          Write-Host "matrix=$matrixJson"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "matrix=$matrixJson"

  detect_changed_packages_pr:
    name: Detect Changed Packages (Pull Request)
    runs-on: self-hosted
    if: github.event_name == 'pull_request'
    outputs:
      packages: ${{ steps.set-packages.outputs.packages }}
      packages-list: ${{ steps.set-packages.outputs.packages-list }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Folders in packages/
        id: set-packages
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          # Get the list of changed files comparing PR base with head
          $changedFiles = git diff --name-only ${{ github.base_ref }} HEAD

          # Extract unique package folders (first directory under packages/)
          $packages = @()
          foreach ($file in $changedFiles) {
            if ($file -match '^packages/([^/]+)') {
              $packageName = $matches[1]
              if ($packageName -notin $packages) {
                $packages += $packageName
              }
            }
          }

          # Sort alphabetically
          $packages = $packages | Sort-Object

          Write-Host "Detected packages: $($packages -join ', ')"

          # Create JSON array for matrix format
          if ($packages.Count -eq 0) {
            $packagesJson = "[]"
            $packagesList = "None"
          } elseif ($packages.Count -eq 1) {
            $packagesJson = "[$($packages[0] | ConvertTo-Json -Compress)]"
            $packagesList = $packages[0]
          } else {
            $packagesJson = $packages | ConvertTo-Json -Compress
            $packagesList = $packages -join ", "
          }

          Write-Host "packages=$packagesJson"
          Write-Host "packages-list=$packagesList"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "packages=$packagesJson"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "packages-list=$packagesList"

  comment_pr:
    name: Comment PR with Detected Changed Packages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: detect_changed_packages_pr
    steps:
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const packages = '${{ needs.detect_changed_packages_pr.outputs.packages-list }}';
            const envName = context.payload.pull_request.base.ref;
            const comment = `## 📦 Changed Packages Detected

            **Modified Packages:** ${packages}

            This pull request affects the following packages in the \`/packages\` folder.
            Will upgrade ${envName} with these packages (in order) upon merging.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  upgrade_environment:
    name: Upgrade Environment
    runs-on: self-hosted
    needs: detect_changed_packages
    if: |
      (github.event_name == 'workflow_dispatch' && needs.detect_changed_packages.outputs.has-packages == 'true') ||
      (github.event_name == 'push' && needs.detect_changed_packages.outputs.has-packages == 'true')
    strategy:
      max-parallel: 1
      matrix:
        item: ${{ fromJson(needs.detect_changed_packages.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize Environment Name
        id: env_name
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          # Get environment name from either workflow_dispatch input or push branch name
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $envName = "${{ github.event.inputs.target_environment }}"
            Write-Host "Triggered by workflow_dispatch with environment: $envName"
          } else {
            $envName = "${{ github.ref_name }}"
            Write-Host "Triggered by push to branch: $envName"
          }

          # Normalize environment names (replace underscores with spaces)
          $envName = $envName -replace 'Release_Source', 'Release Source'
          Write-Host "Normalized environment name: $envName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "TARGET_ENVIRONMENT=$envName"

      - name: Summary
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $package = "${{ matrix.item.package }}"
          $targetEnv = "${{ steps.env_name.outputs.TARGET_ENVIRONMENT }}"

          $summary = @"
          ## :rocket: Environment Upgrade Summary

          | Property | Value |
          |----------|-------|
          | **Environment** | $targetEnv |
          | **Project Name** | $env:PROJECT_NAME |
          | **Package Name** | $package |
          | **Triggered By** | ${{ github.actor }} |
          | **Timestamp** | $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC') |
          "@

          Write-Host $summary
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

      - name: Upgrade Environment
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          # ===== Upgrade Environment =====
          $ErrorActionPreference = 'Stop'
          $targetEnv = "${{ steps.env_name.outputs.TARGET_ENVIRONMENT }}"
          $package = "${{ matrix.item.package }}"

          if ($package -eq "" -or -Not $package) {
            Write-Host "No package to process"
            exit 1
          }

          Write-Host "==== Upgrade package on $targetEnv environment... ===="
          Write-Host "==== Package name: $package ===="

          & java -jar "$env:AGENT_JAR" -Upgrade `
            -ProjectName "${{ env.PROJECT_NAME }}" `
            -EnvName "$targetEnv" `
            -PackageName "$package" `
            -Server "${{ vars.DBMAESTRO_SERVER }}" `
            -UseSSL "${{ env.DBMAESTRO_USE_SSL }}" `
            -AuthType "${{ env.DBMAESTRO_AUTH_TYPE }}" `
            -UserName "${{ env.DBMAESTRO_USER }}" `
            -Password "${{ env.DBMAESTRO_PASSWORD }}"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "==== Upgrade failed for package: $package ===="
            exit 1
          }
          Write-Host "==== Upgrade package on $targetEnv environment completed successfully ===="

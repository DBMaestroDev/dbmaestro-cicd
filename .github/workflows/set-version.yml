# GitHub Actions Set Version Workflow
# Manual workflow for setting environment package version

name: Set Version

on:
  workflow_dispatch:
    inputs:
      PackageName:
        description: 'Package name to set'
        required: true
        type: string
      ProjectName:
        description: 'Project name'
        required: true
        type: string
      EnvName:
        description: 'Environment name'
        required: true
        type: string

env:
  AGENT_JAR: "C:\\Program Files (x86)\\DBmaestro\\DOP Server\\Agent\\DBmaestroAgent.jar"
  DBMAESTRO_USE_SSL: "True"
  DBMAESTRO_SERVER: "${{ vars.DBMAESTRO_SERVER }}"
  DBMAESTRO_AUTH_TYPE: "DBmaestroAccount"
  DBMAESTRO_USER: "${{ secrets.DBMAESTRO_USER }}"
  DBMAESTRO_PASSWORD: "${{ secrets.DBMAESTRO_PASSWORD }}"

jobs:
  set_version:
    name: Set Version
    runs-on: dbmaestro-linux
    
    steps:
      - name: Set Version
        run: |
          & java -jar "$env:AGENT_JAR" `
            -SetVersion `
            -ProjectName "${{ github.event.inputs.ProjectName }}" `
            -EnvName "${{ github.event.inputs.EnvName }}" `
            -PackageName "${{ github.event.inputs.PackageName }}" `
            -UseSSL "$env:DBMAESTRO_USE_SSL" `
            -Server "$env:DBMAESTRO_SERVER" `
            -AuthType "$env:DBMAESTRO_AUTH_TYPE" `
            -UserName "$env:DBMAESTRO_USER" `
            -Password "$env:DBMAESTRO_PASSWORD"
        shell: powershell

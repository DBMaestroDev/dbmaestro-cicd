# Example: Using Actions Directly with Multiple Packages
# This demonstrates how to use the composite actions directly in a workflow
# Useful when you want more control over the workflow structure

name: Example - Direct Action Usage

on:
  workflow_dispatch:
    inputs:
      package_names:
        description: 'Package names to build and validate (comma-separated, e.g., V15,V16,V33)'
        required: true
        type: string
      project_name:
        description: 'DBmaestro project name'
        required: true
        type: string
        default: 'Demo-PSQL'

env:
  AGENT_JAR: '/home/runner/DBmaestroAgent.jar'
  PACKAGES_FOLDER: 'packages'

jobs:
  # Prepare package matrix from comma-separated input
  prepare_matrix:
    name: Prepare Package Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.create-matrix.outputs.matrix }}
      package-count: ${{ steps.create-matrix.outputs.package-count }}
    steps:
      - name: Create Matrix from Input
        id: create-matrix
        shell: bash
        run: |
          # Convert comma-separated packages to JSON array
          IFS=',' read -ra PACKAGES <<< "${{ inputs.package_names }}"
          matrix="["
          first=true
          count=0
          for pkg in "${PACKAGES[@]}"; do
            # Trim whitespace
            pkg=$(echo "$pkg" | xargs)
            if [ -n "$pkg" ]; then
              if [ "$first" = false ]; then
                matrix="$matrix,"
              fi
              matrix="$matrix{\"package\":\"$pkg\"}"
              first=false
              ((count++))
            fi
          done
          matrix="$matrix]"
          
          echo "Generated matrix: $matrix"
          echo "Package count: $count"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "package-count=$count" >> $GITHUB_OUTPUT

  build_packages:
    name: Build Package
    runs-on: dbmaestro-linux
    needs: prepare_matrix
    strategy:
      max-parallel: 1
      matrix:
        item: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display Package Info
        run: |
          echo "Building package: ${{ matrix.item.package }}"
          echo "Project: ${{ inputs.project_name }}"

      # Use the create-package action
      - name: Create Package
        id: create
        uses: ./.github/actions/linux/create-package
        with:
          package-name: ${{ matrix.item.package }}
          project-name: ${{ inputs.project_name }}
          packages-folder: ${{ env.PACKAGES_FOLDER }}
          agent-jar-path: ${{ env.AGENT_JAR }}
          dbmaestro-server: ${{ vars.DBMAESTRO_SERVER }}
          use-ssl: 'True'
          auth-type: 'DBmaestroAccount'
          username: ${{ secrets.DBMAESTRO_USER }}
          password: ${{ secrets.DBMAESTRO_PASSWORD }}
          package-type: 'Regular'
          ignore-script-warnings: 'True'

      - name: Check Create Result
        run: |
          echo "Package created: ${{ steps.create.outputs.package-created }}"

  validate_packages:
    name: Validate Package
    runs-on: dbmaestro-linux
    needs: [prepare_matrix, build_packages]
    strategy:
      max-parallel: 1
      matrix:
        item: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Use the precheck-package action
      - name: Precheck Package
        id: precheck
        uses: ./.github/actions/linux/precheck-package
        with:
          package-name: ${{ matrix.item.package }}
          project-name: ${{ inputs.project_name }}
          agent-jar-path: ${{ env.AGENT_JAR }}
          dbmaestro-server: ${{ vars.DBMAESTRO_SERVER }}
          use-ssl: 'True'
          auth-type: 'DBmaestroAccount'
          username: ${{ secrets.DBMAESTRO_USER }}
          password: ${{ secrets.DBMAESTRO_PASSWORD }}

      - name: Check Validation Result
        run: |
          echo "Validation passed: ${{ steps.precheck.outputs.validation-passed }}"

  report_results:
    name: Report Results
    runs-on: ubuntu-latest
    needs: [prepare_matrix, build_packages, validate_packages]
    if: always()
    steps:
      - name: Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Package Build and Validation Summary
          
          | Property | Value |
          |----------|-------|
          | **Project Name** | ${{ inputs.project_name }} |
          | **Packages** | ${{ inputs.package_names }} |
          | **Package Count** | ${{ needs.prepare_matrix.outputs.package-count }} |
          | **Matrix** | \`${{ needs.prepare_matrix.outputs.matrix }}\` |
          | **Build Status** | ${{ needs.build_packages.result }} |
          | **Validation Status** | ${{ needs.validate_packages.result }} |
          | **Overall Result** | ${{ needs.validate_packages.result == 'success' && '✅ Success' || '❌ Failed' }} |
          EOF

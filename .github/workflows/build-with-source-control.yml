# Notes:
# - Manual workflow_dispatch trigger with package name, tasks list, and commit hash inputs
# - Builds and validates DBmaestro packages with source control integration
# - Windows shell runner executes native PowerShell for every job
#
# Workflow Steps:
# 1. Build package with optional tasks or specific commits
# 2. Run precheck validation of each package

name: SC - Build Package


on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name to build'
        required: true
        type: string
      tasks_list:
        description: '(Optional) Comma-separated list of tasks to include in the package'
        required: false
        type: string
      specific_commit:
        description: '(Optional) Specific commit hash to include in the package'
        required: false
        type: string

env:
  GIT_DEPTH: 1
  AGENT_JAR: "C:\\Program Files (x86)\\DBmaestro\\DOP Server\\Agent\\DBmaestroAgent.jar"
  PROJECT_NAME: "Demo-PSQL"
  DEV_ENV: "Dev_Env_1"
  DBMAESTRO_USE_SSL: "True"
  DBMAESTRO_SERVER: "${{ vars.DBMAESTRO_SERVER }}"
  DBMAESTRO_AUTH_TYPE: "DBmaestroAccount"
  DBMAESTRO_USER: "${{ secrets.DBMAESTRO_USER }}"
  DBMAESTRO_PASSWORD: "${{ secrets.DBMAESTRO_PASSWORD }}"

jobs:
  build_package:
    name: Build Package
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    env:
      PACKAGE_NAME: ${{ github.event.inputs.package_name }}
      TASKS_LIST: ${{ github.event.inputs.tasks_list }}
      SPECIFIC_COMMIT: ${{ github.event.inputs.specific_commit }}
    steps:
      - name: Set Version Type
        id: version_type
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $versionType = ""

          if ("$env:TASKS_LIST" -and "$env:TASKS_LIST".Trim() -ne "") {
            $versionType = "Tasks"
          } elseif ("$env:SPECIFIC_COMMIT" -and "$env:SPECIFIC_COMMIT".Trim() -ne "") {
            $versionType = "Specific Commit"
          }

          Write-Host "VERSION_TYPE: $versionType"
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION_TYPE=$versionType"

      - name: Summary
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $summary = @"
          ## :package: Package Creation Summary

          | Property | Value |
          |----------|-------|
          | **Package Name** | $env:PACKAGE_NAME |
          | **Project Name** | $env:PROJECT_NAME |
          | **Version Type** | $env:VERSION_TYPE |
          | **Included Tasks** | $env:TASKS_LIST |
          | **Specific Commit** | $env:SPECIFIC_COMMIT |
          | **Created By** | ${{ github.actor }} |
          "@

          Write-Host $summary
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

      - name: Build Package
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          # ===== Build Package =====
          Write-Host "==== Create package $env:PACKAGE_NAME ===="
          & java -jar "$env:AGENT_JAR" -Build `
            -ProjectName "$env:PROJECT_NAME" `
            -EnvName "$env:DEV_ENV" `
            -VersionType "$env:VERSION_TYPE" `
            -AdditionalInformation "${{ github.event.inputs.tasks_list || github.event.inputs.specific_commit }}" `
            -CreatePackage True `
            -PackageName "$env:PACKAGE_NAME" `
            -Server "$env:DBMAESTRO_SERVER" `
            -UseSSL "$env:DBMAESTRO_USE_SSL" `
            -AuthType "$env:DBMAESTRO_AUTH_TYPE" `
            -UserName "$env:DBMAESTRO_USER" `
            -Password "$env:DBMAESTRO_PASSWORD"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "==== Failed to create package ===="
            exit 1
          }
          Write-Host "==== Create package completed successfully ===="

  precheck:
    name: Precheck Package
    runs-on: self-hosted
    needs: build_package
    if: github.event_name == 'workflow_dispatch'
    env:
      PACKAGE_NAME: ${{ github.event.inputs.package_name }}
    steps:
      - name: Precheck Package
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          # ===== Precheck Package =====
          Write-Host "==== Pre-Checking package $env:PACKAGE_NAME... ===="
          & java -jar "$env:AGENT_JAR" -PreCheck `
            -ProjectName "$env:PROJECT_NAME" `
            -PackageName "$env:PACKAGE_NAME" `
            -Server "$env:DBMAESTRO_SERVER" `
            -UseSSL "$env:DBMAESTRO_USE_SSL" `
            -AuthType "$env:DBMAESTRO_AUTH_TYPE" `
            -UserName "$env:DBMAESTRO_USER" `
            -Password "$env:DBMAESTRO_PASSWORD"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "==== Precheck failed ===="
            exit 1
          }
          Write-Host "==== Precheck completed successfully ===="

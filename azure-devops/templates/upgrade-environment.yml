# Azure DevOps step template: upgrade-environment
# Upgrades a DBmaestro target environment with a specific package.
#
# Usage in your azure-pipelines.yml:
#
#   steps:
#     - template: azure-devops/templates/upgrade-environment.yml@dbmaestro-cicd
#       parameters:
#         packageName: "MyPackage"
#         projectName: "MyProject"
#         targetEnvironment: "Production"
#         agentJarPath: "/home/runner/DBmaestroAgent.jar"
#         server: "dbmaestro.example.com"
#         user: $(DBMAESTRO_USER)
#         password: $(DBMAESTRO_PASSWORD)

parameters:
  - name: packageName
    type: string
  - name: projectName
    type: string
  - name: targetEnvironment
    type: string
  - name: agentJarPath
    type: string
    default: "/home/runner/DBmaestroAgent.jar"
  - name: server
    type: string
  - name: user
    type: string
  - name: password
    type: string
  - name: useSsl
    type: string
    default: "True"
  - name: authType
    type: string
    default: "DBmaestroAccount"
  - name: useWindows
    type: boolean
    default: false

steps:
  - ${{ if not(parameters.useWindows) }}:
      - task: Bash@3
        displayName: "DBmaestro: Upgrade '${{ parameters.targetEnvironment }}' with '${{ parameters.packageName }}'"
        env:
          DBMAESTRO_PACKAGE_NAME: ${{ parameters.packageName }}
          DBMAESTRO_PROJECT_NAME: ${{ parameters.projectName }}
          DBMAESTRO_TARGET_ENV: ${{ parameters.targetEnvironment }}
          DBMAESTRO_AGENT_JAR: ${{ parameters.agentJarPath }}
          DBMAESTRO_SERVER: ${{ parameters.server }}
          DBMAESTRO_USER: ${{ parameters.user }}
          DBMAESTRO_PASSWORD: ${{ parameters.password }}
          DBMAESTRO_USE_SSL: ${{ parameters.useSsl }}
          DBMAESTRO_AUTH_TYPE: ${{ parameters.authType }}
        inputs:
          targetType: filePath
          filePath: $(Build.SourcesDirectory)/core/scripts/sh/upgrade-environment.sh

  - ${{ if parameters.useWindows }}:
      - task: PowerShell@2
        displayName: "DBmaestro: Upgrade '${{ parameters.targetEnvironment }}' with '${{ parameters.packageName }}' (Windows)"
        env:
          DBMAESTRO_PACKAGE_NAME: ${{ parameters.packageName }}
          DBMAESTRO_PROJECT_NAME: ${{ parameters.projectName }}
          DBMAESTRO_TARGET_ENV: ${{ parameters.targetEnvironment }}
          DBMAESTRO_AGENT_JAR: ${{ parameters.agentJarPath }}
          DBMAESTRO_SERVER: ${{ parameters.server }}
          DBMAESTRO_USER: ${{ parameters.user }}
          DBMAESTRO_PASSWORD: ${{ parameters.password }}
          DBMAESTRO_USE_SSL: ${{ parameters.useSsl }}
          DBMAESTRO_AUTH_TYPE: ${{ parameters.authType }}
        inputs:
          targetType: filePath
          filePath: $(Build.SourcesDirectory)/core/scripts/ps/upgrade-environment.ps1
          pwsh: true

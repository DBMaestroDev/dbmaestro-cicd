# Example: Build with Direct Template Usage (GitLab CI)
# Manually triggers a build for specified packages using direct template includes.
# Useful for ad-hoc builds with full control over each step.

include:
  - remote: 'https://raw.githubusercontent.com/DBMaestroDev/dbmaestro-cicd/main/gitlab/templates/get-cli-jar.yml'
  - remote: 'https://raw.githubusercontent.com/DBMaestroDev/dbmaestro-cicd/main/gitlab/templates/create-package.yml'
  - remote: 'https://raw.githubusercontent.com/DBMaestroDev/dbmaestro-cicd/main/gitlab/templates/precheck-package.yml'

stages:
  - setup
  - build
  - validate

variables:
  DBMAESTRO_PROJECT_NAME: 'Demo-PSQL'
  DBMAESTRO_PACKAGES_FOLDER: 'packages'
  DBMAESTRO_USE_SSL: 'True'
  DBMAESTRO_AUTH_TYPE: 'DBmaestroAccount'
  DBMAESTRO_PACKAGE_TYPE: 'Regular'
  DBMAESTRO_AGENT_JAR: '/home/runner/DBmaestroAgent.jar'
  # Override PACKAGE_NAMES_INPUT at pipeline run time via CI/CD variables
  # Format: comma-separated, e.g., "V15,V16,V33"
  PACKAGE_NAMES_INPUT: ''

# --- Setup Stage ---
get_cli_jar:
  extends: .get-cli-jar
  stage: setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always

# --- Build Stage: one job per package (matrix simulation using parallel) ---
# GitLab does not natively fan-out on a dynamic list, so packages are processed
# sequentially via a single job that loops over the comma-separated input.
create_packages:
  extends: .create-package
  stage: build
  needs: [get_cli_jar]
  script:
    - |
      IFS=',' read -ra PACKAGES <<< "$PACKAGE_NAMES_INPUT"
      for PKG in "${PACKAGES[@]}"; do
        PKG=$(echo "$PKG" | xargs)
        [ -z "$PKG" ] && continue
        export DBMAESTRO_PACKAGE_NAME="$PKG"
        echo "Creating package: $PKG"
        bash "$CI_PROJECT_DIR/core/scripts/sh/create-package.sh"
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always

# --- Validate Stage ---
precheck_packages:
  extends: .precheck-package
  stage: validate
  needs: [create_packages]
  script:
    - |
      IFS=',' read -ra PACKAGES <<< "$PACKAGE_NAMES_INPUT"
      for PKG in "${PACKAGES[@]}"; do
        PKG=$(echo "$PKG" | xargs)
        [ -z "$PKG" ] && continue
        export DBMAESTRO_PACKAGE_NAME="$PKG"
        echo "Prechecking package: $PKG"
        bash "$CI_PROJECT_DIR/core/scripts/sh/precheck-package.sh"
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always

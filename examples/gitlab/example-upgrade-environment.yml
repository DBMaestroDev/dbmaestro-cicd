# Example: Upgrade Environment (GitLab CI)
# Upgrades a DBmaestro environment on push, MR, or manual trigger.
# resource_group prevents concurrent upgrades to the same environment.

include:
  - remote: 'https://raw.githubusercontent.com/DBMaestroDev/dbmaestro-cicd/main/gitlab/templates/get-cli-jar.yml'
  - remote: 'https://raw.githubusercontent.com/DBMaestroDev/dbmaestro-cicd/main/gitlab/templates/detect-packages.yml'
  - remote: 'https://raw.githubusercontent.com/DBMaestroDev/dbmaestro-cicd/main/gitlab/templates/upgrade-environment.yml'

stages:
  - setup
  - detect
  - deploy

variables:
  DBMAESTRO_PROJECT_NAME: 'Demo-PSQL'
  DBMAESTRO_USE_SSL: 'True'
  DBMAESTRO_AUTH_TYPE: 'DBmaestroAccount'
  DBMAESTRO_AGENT_JAR: '/home/runner/DBmaestroAgent.jar'
  # For manual runs, set TARGET_ENVIRONMENT in the "Run pipeline" UI
  TARGET_ENVIRONMENT: ''

# --- Setup Stage ---
get_cli_jar:
  extends: .get-cli-jar
  stage: setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# --- Detect Stage (push-triggered only, detect packages from commit) ---
detect_from_push:
  extends: .detect-packages
  stage: detect
  needs: [get_cli_jar]
  variables:
    DETECT_FROM_PUSH: 'true'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Deploy Stage ---
upgrade_environment_on_push:
  extends: .upgrade-environment
  stage: deploy
  needs:
    - job: detect_from_push
      artifacts: true
  variables:
    DBMAESTRO_TARGET_ENV: $CI_COMMIT_REF_NAME
  resource_group: upgrade-${{ env.DBMAESTRO_PROJECT_NAME }}-$CI_COMMIT_REF_NAME
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

upgrade_environment_on_mr:
  extends: .upgrade-environment
  stage: deploy
  needs: [get_cli_jar]
  variables:
    DBMAESTRO_TARGET_ENV: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    DETECT_IS_PULL_REQUEST: 'true'
  resource_group: upgrade-${{ env.DBMAESTRO_PROJECT_NAME }}-$CI_MERGE_REQUEST_TARGET_BRANCH_NAME
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

upgrade_environment_manual:
  extends: .upgrade-environment
  stage: deploy
  needs: [get_cli_jar]
  variables:
    DBMAESTRO_TARGET_ENV: $TARGET_ENVIRONMENT
  resource_group: upgrade-${{ env.DBMAESTRO_PROJECT_NAME }}-$TARGET_ENVIRONMENT
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always

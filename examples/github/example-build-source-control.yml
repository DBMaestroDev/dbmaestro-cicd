# Example: Build from Source Control (Tasks or Specific Commit)
# Builds a DBmaestro package from source control by task list or commit hash.
# Use "All Changes" to include everything since the last build.

name: Example - Build from Source Control (Linux)

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name to build'
        required: true
        type: string
      project_name:
        description: 'DBmaestro project name'
        required: true
        type: choice
        options:
          - 'Demo-PSQL'
          - 'Demo-MSSQL'
        default: 'Demo-PSQL'
      environment_name:
        description: 'Development environment name'
        required: false
        type: string
        default: 'Dev_Env_1'
      build_type:
        description: 'What to include in the package'
        required: true
        type: choice
        options:
          - 'All Changes (empty)'
          - 'Specific Tasks'
          - 'Specific Commit'
        default: 'All Changes (empty)'
      tasks_list:
        description: 'Comma-separated task IDs (used when build_type is "Specific Tasks")'
        required: false
        type: string
      commit_hash:
        description: 'Commit hash (used when build_type is "Specific Commit")'
        required: false
        type: string

jobs:
  prepare_parameters:
    name: Prepare Build Parameters
    runs-on: ubuntu-latest
    outputs:
      version_type: ${{ steps.set-params.outputs.version_type }}
      additional_info: ${{ steps.set-params.outputs.additional_info }}
    steps:
      - name: Set Build Parameters
        id: set-params
        shell: bash
        run: |
          case "${{ inputs.build_type }}" in
            "Specific Tasks")
              VERSION_TYPE="Tasks"
              ADDITIONAL_INFO="${{ inputs.tasks_list }}"
              ;;
            "Specific Commit")
              VERSION_TYPE="Specific Commit"
              ADDITIONAL_INFO="${{ inputs.commit_hash }}"
              ;;
            *)
              VERSION_TYPE=""
              ADDITIONAL_INFO=""
              ;;
          esac
          echo "version_type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          echo "additional_info=$ADDITIONAL_INFO" >> $GITHUB_OUTPUT

  build_and_validate:
    name: Build and Validate Package
    needs: prepare_parameters
    uses: DBMaestroDev/dbmaestro-cicd/.github/workflows/sh-build-source-control.yml@main
    with:
      package_name: ${{ inputs.package_name }}
      project_name: ${{ inputs.project_name }}
      environment-name: ${{ inputs.environment_name }}
      version_type: ${{ needs.prepare_parameters.outputs.version_type }}
      additional_information: ${{ needs.prepare_parameters.outputs.additional_info }}
      agent_jar_path: '/home/runner/DBmaestroAgent.jar'
      use_ssl: 'True'
      auth_type: 'DBmaestroAccount'
      runner: 'dbmaestro-linux'
      dbmaestro_server: ${{ vars.DBMAESTRO_SERVER }}
      dbmaestro_user: ${{ vars.DBMAESTRO_USER }}
    secrets:
      DBMAESTRO_PASSWORD: ${{ secrets.DBMAESTRO_PASSWORD }}

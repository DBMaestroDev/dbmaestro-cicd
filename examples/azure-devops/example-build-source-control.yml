# Example: Build from Source Control (Azure DevOps)
# Builds a DBmaestro package from source control by task list, commit hash, or all changes.
# Trigger manually via the Azure DevOps UI and set the required parameters.

parameters:
  - name: packageName
    displayName: 'Package name to build'
    type: string
  - name: projectName
    displayName: 'DBmaestro project name'
    type: string
    default: 'Demo-PSQL'
  - name: environmentName
    displayName: 'Development environment name'
    type: string
    default: 'Dev_Env_1'
  - name: buildType
    displayName: 'What to include in the package'
    type: string
    values:
      - 'All Changes'
      - 'Specific Tasks'
      - 'Specific Commit'
    default: 'All Changes'
  - name: tasksList
    displayName: 'Task IDs (comma-separated, used when buildType = Specific Tasks)'
    type: string
    default: ''
  - name: commitHash
    displayName: 'Commit hash (used when buildType = Specific Commit)'
    type: string
    default: ''
  - name: agentJarPath
    type: string
    default: '/home/runner/DBmaestroAgent.jar'
  - name: runnerPool
    type: string
    default: 'dbmaestro-linux'

trigger: none
pr: none

stages:
  - stage: Setup
    displayName: 'Setup'
    jobs:
      - job: GetCliJar
        displayName: 'Download DBmaestro CLI'
        pool: ${{ parameters.runnerPool }}
        steps:
          - template: azure-devops/templates/get-cli-jar.yml@dbmaestro-cicd
            parameters:
              jarPath: ${{ parameters.agentJarPath }}
              useWindows: false

  - stage: Build
    displayName: 'Build Package from Source Control'
    dependsOn: Setup
    jobs:
      - job: BuildFromSource
        displayName: 'Build Package - ${{ parameters.packageName }}'
        pool: ${{ parameters.runnerPool }}
        steps:
          - checkout: self

          - bash: |
              case "${{ parameters.buildType }}" in
                "Specific Tasks")
                  echo "##vso[task.setvariable variable=versionType]Tasks"
                  echo "##vso[task.setvariable variable=additionalInfo]${{ parameters.tasksList }}"
                  ;;
                "Specific Commit")
                  echo "##vso[task.setvariable variable=versionType]Specific Commit"
                  echo "##vso[task.setvariable variable=additionalInfo]${{ parameters.commitHash }}"
                  ;;
                *)
                  echo "##vso[task.setvariable variable=versionType]"
                  echo "##vso[task.setvariable variable=additionalInfo]"
                  ;;
              esac
            displayName: 'Resolve Build Type Parameters'

          - template: azure-devops/templates/build-from-source.yml@dbmaestro-cicd
            parameters:
              packageName: ${{ parameters.packageName }}
              projectName: ${{ parameters.projectName }}
              envName: ${{ parameters.environmentName }}
              versionType: $(versionType)
              additionalInformation: $(additionalInfo)
              agentJarPath: ${{ parameters.agentJarPath }}
              server: $(DBMAESTRO_SERVER)
              user: $(DBMAESTRO_USER)
              password: $(DBMAESTRO_PASSWORD)
              useSsl: 'True'
              authType: 'DBmaestroAccount'
              useWindows: false
